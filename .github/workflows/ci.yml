name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: sanity
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::180971085012:role/aws-hosted-podcast-github-deploy
          aws-region: us-east-1
          role-session-name: github-actions-podcast-deploy

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform plan
        run: terraform -chdir=terraform plan -var "podcast_bucket_name=podcasthostingstack-podcastbucket09986f6a-7benur70xfx0"

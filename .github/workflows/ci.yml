name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Synthesize
        run: pnpm exec cdk synth

  deploy:
    runs-on: ubuntu-latest
    needs: sanity
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "180971085012"
      CDK_DEFAULT_ACCOUNT: "180971085012"
      CDK_DEFAULT_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::180971085012:role/aws-hosted-podcast-github-deploy
          aws-region: us-east-1
          role-session-name: github-actions-podcast-deploy

      - name: Bootstrap CDK
        run: pnpm exec cdk bootstrap

      - name: Deploy
        run: pnpm exec cdk deploy --require-approval never
